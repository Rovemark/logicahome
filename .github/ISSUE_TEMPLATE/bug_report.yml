name: Bug report
description: Something is broken or behaves unexpectedly
labels: [bug, triage]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug. Please sanitize tokens, IPs, and device IDs before submitting.
  - type: input
    id: version
    attributes:
      label: LogicaHome version
      placeholder: "0.1.0 (output of `logicahome version`)"
    validations:
      required: true
  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: "3.12.4"
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS
        - Linux
        - Windows
        - Other
    validations:
      required: true
  - type: dropdown
    id: adapter
    attributes:
      label: Adapter involved
      options:
        - tuya
        - home_assistant
        - none / core
        - other (specify in description)
    validations:
      required: true
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you expect, and what actually happened?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Exact commands or MCP calls.
      render: shell
    validations:
      required: true
  - type: textarea
    id: traceback
    attributes:
      label: Logs / traceback
      render: shell
